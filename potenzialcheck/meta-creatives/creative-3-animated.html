<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creative 3 · Animiert (pulsierende Zeile)</title>
<!--
  Meta Animated Creative 3 · smartwandler Potenzial-Check (Dark-Variante)
  Fläche: exakt 1080 x 1350 px (4:5). Loop-Dauer: 3s (nahtlos).
  Die letzte Zeile ("? Gebundenes Kapital durch Routinearbeit") pulsiert
  sanft größer und wieder zurück – nie kleiner als die fixe Ausgangsgröße
  (scale 1.0 → 1.08 → 1.0, ease-in-out, sprungfreier Loop).
  Render zu MP4/GIF: convert-to-mp4.sh (FILES=creative-3-animated.html).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#FAF8F5; --ink-dark:#3A3631; --gold:#C8A96A; --light:#FAF8F5; --light-soft:#C9C3BA; --label:#A79F94; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#22201d; }
  body{ display:flex; justify-content:center; align-items:flex-start; padding:40px; font-family:'Inter',system-ui,-apple-system,sans-serif; }

  .creative{
    width:1080px; height:1350px; flex:none;
    background:
      radial-gradient(58% 42% at 72% 60%, rgba(200,169,106,0.16), rgba(200,169,106,0) 70%),
      linear-gradient(158deg, #443F39 0%, #3A3631 55%, #302D28 100%);
    color:var(--light);
    padding:96px 90px 84px;
    display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
  }

  .kicker{ display:flex; align-items:center; gap:18px; margin-bottom:44px; }
  .kicker .line{ width:46px; height:3px; background:var(--gold); border-radius:2px; flex:none; }
  .kicker .txt{ font-size:25px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--label); }
  .headline{ font-size:74px; line-height:1.1; font-weight:600; letter-spacing:-0.025em; color:var(--light); max-width:900px; }

  /* Motiv: Kennzahlen-Karte */
  .card{ background:rgba(250,248,245,0.05); border:1px solid rgba(250,248,245,0.12); border-radius:24px; padding:44px 48px; overflow:hidden; }
  .row{ display:flex; align-items:center; gap:26px; padding:16px 0; }
  .row + .row{ border-top:1px solid rgba(250,248,245,0.10); }
  .row .mark{ width:52px; flex:none; text-align:center; }
  .row .check{ font-size:40px; color:var(--gold); font-weight:700; line-height:1; }
  .row .lbl{ font-size:38px; color:var(--light-soft); }
  .row.q .qmark{ font-size:64px; color:var(--gold); font-weight:700; line-height:1; }
  .row.q .lbl{ font-size:38px; color:var(--light); font-weight:600; }

  /* ── Pulsierende Frage-Zeile ─────────────────────────────────────
     Skaliert sanft von 1.0 (fixe Ausgangsgröße) bis 1.08 und zurück.
     transform-origin links → wächst nach rechts, „?" bleibt verankert.
     0%/100% = scale(1) → nahtloser 3s-Loop, nie kleiner als Original. */
  .row.q{ transform-origin:left center; animation:pulse 3s ease-in-out infinite; will-change:transform; }
  @keyframes pulse{
    0%  { transform:scale(1); }
    50% { transform:scale(1.08); }
    100%{ transform:scale(1); }
  }

  .footer{ display:flex; justify-content:flex-end; align-items:center; gap:15px; }
  /* Logo näher an den Text (gap), leicht nach unten und rechts (translate) */
  .footer .logo{ width:82px; height:82px; display:block; flex:none; transform:translate(6px,5px); }
  .footer .brand{ text-align:left; }
  .footer .lmark{ font-size:32px; font-weight:700; letter-spacing:-0.02em; color:var(--light); }
  .footer .sub{ font-size:21px; color:var(--label); margin-top:4px; }

  @media print{ html,body{ background:#fff; } body{ padding:0; } }
</style>
</head>
<body>
  <div class="creative" id="creative">

    <div class="head">
      <div class="kicker">
        <span class="line"></span>
        <span class="txt">Der 2-Minuten-Test für Entscheider in Dresden</span>
      </div>
      <h1 class="headline">Sie kennen jede Zahl in Ihrem Betrieb. Diese eine vermutlich nicht.</h1>
    </div>

    <div class="card">
      <div class="row"><span class="mark"><span class="check">&#10003;</span></span><span class="lbl">Umsatz</span></div>
      <div class="row"><span class="mark"><span class="check">&#10003;</span></span><span class="lbl">Marge</span></div>
      <div class="row"><span class="mark"><span class="check">&#10003;</span></span><span class="lbl">Auslastung</span></div>
      <div class="row q"><span class="mark"><span class="qmark">?</span></span><span class="lbl">Gebundenes Kapital durch Routinearbeit</span></div>
    </div>

    <div class="footer">
      <img class="logo" src="logo-white-complete.png" alt="smartwandler Logo" width="82" height="82">
      <div class="brand">
        <div class="lmark">smartwandler</div>
        <div class="sub">Kostenloser Potenzial-Check &middot; 2 Minuten</div>
      </div>
    </div>

  </div>
</body>
</html>
