<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creative 4 · Animiert (Gauge-Nadel)</title>
<!--
  Meta Animated Creative 4 · smartwandler Potenzial-Check (Dark-Variante)
  Fläche: exakt 1080 x 1350 px (4:5). Loop-Dauer: 3s (nahtlos).
  Die Gauge-Nadel schwingt aus der ?-/Neutral-Zone nach rechts oben in die
  Gold-Zone und schlägt am €-Ende an; im Anschlag-Moment wird das €-Zeichen
  kurz größer und blinkt. Danach schwingt die Nadel zurück (sprungfreier Loop).
  Render zu MP4/GIF: convert-to-mp4.sh (FILES=creative-4-animated.html).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#FAF8F5; --ink-dark:#3A3631; --gold:#C8A96A; --light:#FAF8F5; --light-soft:#C9C3BA; --label:#A79F94; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#22201d; }
  body{ display:flex; justify-content:center; align-items:flex-start; padding:40px; font-family:'Inter',system-ui,-apple-system,sans-serif; }

  .creative{
    width:1080px; height:1350px; flex:none;
    background:
      radial-gradient(56% 40% at 70% 60%, rgba(200,169,106,0.16), rgba(200,169,106,0) 70%),
      linear-gradient(158deg, #443F39 0%, #3A3631 55%, #302D28 100%);
    color:var(--light);
    padding:96px 90px 84px;
    display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
  }

  .kicker{ display:flex; align-items:center; gap:18px; margin-bottom:44px; }
  .kicker .line{ width:46px; height:3px; background:var(--gold); border-radius:2px; flex:none; }
  .kicker .txt{ font-size:25px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--label); }
  .headline{ font-size:78px; line-height:1.1; font-weight:600; letter-spacing:-0.03em; color:var(--light); max-width:920px; }
  .subhead{ font-size:40px; line-height:1.2; font-weight:500; letter-spacing:-0.015em; color:var(--light-soft); margin-top:28px; max-width:840px; }

  /* Motiv: Rechnet-sich-Anzeige (Gauge) */
  .motif{ display:flex; flex-direction:column; align-items:flex-start; gap:14px; }
  .gauge{ width:480px; height:300px; display:block; overflow:visible; }
  .motif .cap{ font-size:30px; color:var(--light-soft); font-style:italic; padding-left:6px; }

  /* ── Nadel schwingt ins Gold & schlägt am €-Ende an ───────────────
     Nadel ist senkrecht nach oben gezeichnet und wird um die Achse
     (200,200) gedreht. Winkel im Uhrzeigersinn: 0°=oben, +rechts, -links.
     Start −55° (?-Seite) → ~58° (Gold, €). Overshoot = Anschlag-Bounce.
     0% == 100% → nahtloser 3s-Loop. */
  .needle{ transform-box: view-box; transform-origin: 200px 200px; animation:needleSweep 3s infinite; will-change:transform; }
  @keyframes needleSweep{
    0%  { transform:rotate(-55deg); animation-timing-function:cubic-bezier(.35,0,.25,1); }
    33% { transform:rotate(66deg); animation-timing-function:cubic-bezier(.3,0,.4,1); } /* Overshoot */
    40% { transform:rotate(58deg); animation-timing-function:linear; }                  /* Anschlag */
    68% { transform:rotate(58deg); animation-timing-function:cubic-bezier(.5,0,.3,1); } /* Halten */
    100%{ transform:rotate(-55deg); }                                                   /* zurück */
  }

  /* ── €-Zeichen: im Anschlag-Moment groß + blinken ─────────────────
     Skaliert um die eigene Mitte; Opacity-Flackern = Blinken.
     Vor Ankunft (0–33%) und ab 58% wieder normal → nahtlos. */
  .euro{ transform-box: fill-box; transform-origin: center; animation:euroPop 3s infinite; will-change:transform,opacity; }
  @keyframes euroPop{
    0%,33% { transform:scale(1);    opacity:1;   }
    36%    { transform:scale(1.65); opacity:1;   }
    40%    { transform:scale(1.4);  opacity:0.2; }
    44%    { transform:scale(1.6);  opacity:1;   }
    48%    { transform:scale(1.35); opacity:0.25;}
    52%    { transform:scale(1.55); opacity:1;   }
    58%    { transform:scale(1);    opacity:1;   }
    100%   { transform:scale(1);    opacity:1;   }
  }

  .footer{ display:flex; justify-content:flex-end; align-items:center; gap:15px; }
  /* Logo näher an den Text (gap), leicht nach unten und rechts (translate) */
  .footer .logo{ width:82px; height:82px; display:block; flex:none; transform:translate(6px,5px); }
  .footer .brand{ text-align:left; }
  .footer .mark{ font-size:32px; font-weight:700; letter-spacing:-0.02em; color:var(--light); }
  .footer .sub{ font-size:21px; color:var(--label); margin-top:4px; }

  @media print{ html,body{ background:#fff; } body{ padding:0; } }
</style>
</head>
<body>
  <div class="creative" id="creative">

    <div class="head">
      <div class="kicker">
        <span class="line"></span>
        <span class="txt">Für Geschäftsführer im Raum Dresden (bis 20 Mitarbeiter)</span>
      </div>
      <h1 class="headline">Lohnt sich Automatisierung in Ihrem Betrieb?</h1>
      <p class="subhead">Berechnen Sie in 2 min Ihr Einsparpotenzial.</p>
    </div>

    <div class="motif">
      <svg class="gauge" viewBox="0 0 400 250" fill="none" aria-label="Rechnet-sich-Anzeige, Nadel schwingt ins Plus, € blinkt">
        <!-- Track -->
        <path d="M 40 200 A 160 160 0 0 1 360 200" stroke="#FAF8F5" stroke-opacity="0.16" stroke-width="26" stroke-linecap="round"/>
        <!-- Gold-Zone (rechtes Drittel = „lohnt sich") -->
        <path d="M 292 69 A 160 160 0 0 1 360 200" stroke="#C8A96A" stroke-width="26" stroke-linecap="round"/>
        <!-- Nadel (senkrecht gezeichnet, per Rotation geschwenkt) -->
        <line class="needle" x1="200" y1="200" x2="200" y2="55" stroke="#FAF8F5" stroke-width="9" stroke-linecap="round"/>
        <!-- Achse -->
        <circle cx="200" cy="200" r="16" fill="#FAF8F5"/>
        <circle cx="200" cy="200" r="6" fill="#302D28"/>
        <!-- Endlabels: von „?" zu „€" -->
        <text x="36" y="240" font-size="32" fill="#A79F94" text-anchor="middle" font-family="Inter,sans-serif" font-weight="600">?</text>
        <text class="euro" x="366" y="242" font-size="36" fill="#C8A96A" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700">&euro;</text>
      </svg>
    </div>

    <div class="footer">
      <img class="logo" src="logo-white-complete.png" alt="smartwandler Logo" width="82" height="82">
      <div class="brand">
        <div class="mark">smartwandler</div>
        <div class="sub">Kostenloser Potenzial-Check &middot; 2 Minuten</div>
      </div>
    </div>

  </div>
</body>
</html>
