<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creative 1 · Der laufende Verlust</title>
<!--
  Meta Static Creative 1 · smartwandler Potenzial-Check
  Fläche: exakt 1080 x 1350 px (4:5). Text editierbar (echte HTML-Elemente).
  Export PNG: DevTools → Element #creative → „Node-Screenshot" (exakter Ausschnitt).
  Export PDF: Drucken → Als PDF speichern (4:5 erhalten).
  Für 1:1: .creative { height:1080px } setzen und neu exportieren.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F5; --ink:#3A3631; --ink-soft:#5F5952; --ink-faint:#7C766C;
    --gold:#C8A96A;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#e7e4df; }
  body{
    display:flex; justify-content:center; align-items:flex-start;
    padding:40px; font-family:'Inter',system-ui,-apple-system,sans-serif;
  }

  /* ── Die Creative-Fläche: exakt 1080 x 1350 (4:5) ── */
  .creative{
    width:1080px; height:1350px; flex:none;
    /* warmer Verlauf statt flachem Weiß + dezenter Gold-Glow hinter der Zahl */
    background:
      radial-gradient(58% 42% at 76% 60%, rgba(200,169,106,0.16), rgba(200,169,106,0) 70%),
      linear-gradient(158deg, #FAF8F5 0%, #F4EEE4 52%, #ECE4D6 100%);
    color:var(--ink);
    padding:96px 90px 84px;
    display:flex; flex-direction:column; justify-content:space-between;
    overflow:hidden; position:relative;
  }

  /* ── Kopf: Kicker + Headline ── */
  .kicker{ display:flex; align-items:center; gap:18px; margin-bottom:44px; }
  .kicker .line{ width:46px; height:3px; background:var(--gold); border-radius:2px; flex:none; }
  .kicker .txt{
    font-size:25px; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--ink-faint);
  }
  .headline{
    font-size:76px; line-height:1.1; font-weight:600;
    letter-spacing:-0.025em; color:var(--ink); max-width:900px;
  }
  .headline .q{ color:var(--ink); }

  /* ── Motiv: die verdeckte Euro-Zahl ── */
  .amount-wrap{ margin:0; }
  .amount{
    display:flex; align-items:center; gap:2px;
    font-size:150px; font-weight:600; letter-spacing:-0.02em; color:var(--ink);
    line-height:1;
  }
  .amount .bar{
    display:inline-block; width:82px; height:112px; margin:0 7px;
    background:var(--gold); border-radius:12px;
  }
  .amount .bar:first-child{ margin-left:0; }
  .amount .dot{ margin:0 6px 0 2px; }
  .amount .euro{ margin-left:26px; }
  .amount-note{
    font-size:30px; color:var(--ink-soft); margin-top:22px; letter-spacing:0.01em;
  }

  /* ── Footer: Logo + Wortmarke unten rechts ── */
  .footer{ display:flex; justify-content:flex-end; align-items:center; gap:15px; }
  /* Logo näher an den Text (gap), leicht nach unten und rechts (translate) */
  .footer .logo{ width:82px; height:82px; display:block; flex:none; transform:translate(6px,4px); }
  .footer .brand{ text-align:left; }
  .footer .mark{
    font-size:32px; font-weight:700; letter-spacing:-0.02em; color:var(--ink);
  }
  .footer .sub{ font-size:21px; color:var(--ink-faint); margin-top:4px; }

  @media print{
    html,body{ background:#fff; }
    body{ padding:0; }
  }
</style>
</head>
<body>
  <div class="creative" id="creative">

    <!-- Kopf -->
    <div class="head">
      <div class="kicker">
        <span class="line"></span>
        <span class="txt">Für Geschäftsführer im Raum Dresden (bis 20 Mitarbeiter)</span>
      </div>
      <h1 class="headline">Ihr Betrieb verliert gerade Geld durch Routinearbeit. <span class="q">Die Frage ist nur: wie viel?</span></h1>
    </div>

    <!-- Motiv: verdeckte Zahl -->
    <div class="amount-wrap">
      <div class="amount" aria-label="verdeckte Euro-Zahl">
        <span class="bar"></span><span class="bar"></span>
        <span class="dot">.</span>
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="euro">&euro;</span>
      </div>
      <div class="amount-note">pro Jahr</div>
    </div>

    <!-- Footer: Logo + Wortmarke -->
    <div class="footer">
      <picture>
        <source srcset="logo-small.webp" type="image/webp">
        <img class="logo" src="logo-small.png" alt="smartwandler Logo" width="74" height="74">
      </picture>
      <div class="brand">
        <div class="mark">smartwandler</div>
        <div class="sub">Kostenloser Potenzial-Check &middot; 2 Minuten</div>
      </div>
    </div>

  </div>
</body>
</html>
